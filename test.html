<!DOCTYPE html>
<html lang="en" data-theme="dark">
    <head>
        <title>Ska.Space - Posts</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="global/css/universal.css">
        <link rel="stylesheet" href="global/css/style.css">
        <link rel="stylesheet" href="global/css/posts.css">
		<link rel="shortcut icon" type="image/x-icon" href="global/media/images/ska/wumpus.webp" />  
    </head>
    <div id="changingTheme"></div>
    <body class="supportMovingBG">
        <nav id="navbox" class="transparency">
            <a href="index.html"><img src="global/media/images/ska/wumpus.webp" class="navIcon iconLeft rounded mobileCenter" title="Logo / Home Button" alt="Site Logo and Home Button"/></a>
            <button class="siteName offMobile" onclick="uiFunction('Spaces')" title="Open Spaces Menu" alt="Button to Open Spaces Menu">
                <img src="global/media/images/navburger.webp" class="navIcon iconTypeList invert iconLeft" title="nyoho" alt="Icon For Nav">
                <span id="spaceName">Ska.Space</span>
            </button>
            <button onclick="uiFunction('Drawer')" id="navToggle"></button>
            <img class="navIcon iconTypeTheme" title="Theme" onclick="changeThemeToggle('Theme')">
            <a href="settings.html"><img src="global/media/icons/nav/settings.png" class="navIcon iconTypeGear invert rotate" alt="Settings"></a>
            <a href="seal/search.html"><img src="global/media/icons/nav/search.png" class="navIcon iconTypeGear invert offMobile" alt="Seal Search"></a>
            <div id="linkContainer">
                <h2 class="onMobile">Ska.Space</h2> 
                <a href="index.html">Home</a>
                <a href="projects.html">Projects</a>
                <a href="posts.html">Posts</a>
                <a href="gallery.html" class="active">Test</a>
                <div id="spaceList">
                    <hr class="onMobile"><h2>Spaces</h2>
                    <!-- List obtained on page load from scripts.js -->
                </div>
            </div>
        </nav>

        <div id="leavingPage"></div>
        
        <div id="imageViewer" onclick="uiFunction('Viewer')">
            <div id="imageBackdrop"></div>
            <div id="imageDisplay"></div>
            <button title="Close">x</button>
        </div>

        <main onclick="clickPage()">
            <article> 
                <button id="themeButtonDark" onclick="changeThemeTest('dark')">Dark Mode</button>
                <button id="themeButtonLight" onclick="changeThemeTest('light')">Light Mode</button>
                <button id="themeButtonOLED" onclick="changeThemeTest('oled')">The Abyss</button>
                <button id="themeButtonBlue" onclick="changeThemeTest('blue')">It's Blue!</button>
                <button id="themeButtonRed" onclick="changeThemeTest('red')">Smooth Red</button>
                <button id="themeButtonTwilight" onclick="changeThemeTest('twilight')">Twilight</button>
                <button id="themeButtonRGB" onclick="changeThemeTest('rgb')">Gamer Lighting</button>
            </article>
        </main>
    </body>
    <script src="global/scripts/scripts.js"></script>
</html>
